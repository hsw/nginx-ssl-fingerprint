daemon off;
master_process off;
worker_processes 1;
error_log /dev/stdout info;

events { worker_connections 64; }

http {
    # Small pool forces ngx_pnalloc to fall through to malloc for the H2
    # fingerprint buffer (~172 bytes > pool->max=48), giving ASAN red-zone
    # coverage on individual allocations.  Default 512 keeps everything
    # inside one pool block where ASAN cannot detect internal overflows.
    connection_pool_size 128;

    log_format fp escape=none '$request ja3=$http_ssl_ja3 | hash=$http_ssl_ja3_hash | h2fp=$http2_fingerprint';
    access_log /dev/stdout fp;

    # Internal backend for proxy_pass.  H2 test requests are proxied so
    # that request processing is asynchronous — the H2 frame parser can
    # capture priorities from multiple HEADERS frames before
    # fp_fingerprinted is set (single-threaded nginx processes all frames
    # in the read buffer before the event loop handles upstream responses).
    server {
        listen 127.0.0.1:8080;
        access_log off;
        location / { return 200 "ok\n"; }
    }

    server {
        listen 8443 ssl;
        http2 on;
        ssl_certificate /work/test.crt;
        ssl_certificate_key /work/test.key;
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
        ssl_ciphers ALL:@SECLEVEL=0;

        # H2 overflow tests: proxy keeps the request async so multiple
        # HEADERS priorities are captured before fingerprinting fires.
        location /h2- {
            proxy_pass http://127.0.0.1:8080;
        }

        location / { return 200 "ok\n"; }
    }
}

stream {
    log_format stream_fp '$stream_ssl_ja3 | $stream_ssl_ja3_hash';
    access_log /dev/stdout stream_fp;

    server {
        listen 8444 ssl;
        ssl_certificate /work/test.crt;
        ssl_certificate_key /work/test.key;
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
        ssl_ciphers ALL:@SECLEVEL=0;
        return "stream-ok\n";
    }
}
